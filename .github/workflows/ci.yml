name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # cosign keyless

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint everything that can be linted offline ──────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: compose/ k8s/ .github/
          # Strictly fail on errors only — warnings are stylistic and
          # noisy in real Helm/Kustomize/Compose YAML.
          strict: false
          no_warnings: true
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              comments-indentation: disable
              comments:
                min-spaces-from-content: 1
              indentation:
                spaces: 2
                indent-sequences: consistent
              truthy:
                check-keys: false
              braces:
                max-spaces-inside: 1
              brackets:
                max-spaces-inside: 1

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules/**
            !docs/MASTER_PROMPT.md

  # ─── Render kustomize overlays + kubeconform ─────────────────────────────
  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install kubeconform
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
      - name: render + kubeconform (all overlays)
        run: |
          for env in dev staging prod; do
            echo "::group::overlay $env"
            kubectl kustomize "k8s/overlays/$env" \
              | kubeconform -strict -summary \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            echo "::endgroup::"
          done

  # ─── Build the wrapper, scan, push (only on push to main / tags) ─────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, k8s-validate]
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: docker login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: build (and push on non-PR)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MCP_GRAFANA_VERSION=0.12.1

      - name: trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
        if: github.event_name != 'pull_request'

      - name: cosign keyless sign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
      - name: sign
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

  # ─── Functional + API tests against compose stack ────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' || needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: pip install
        run: pip install -r tests/requirements.txt

      - name: cp .env.example
        run: cp .env.example .env

      - name: docker compose up (full LGTM)
        run: |
          docker compose --env-file .env -f compose/docker-compose.yml \
            --profile local-grafana up -d --wait

      - name: seed grafana
        run: ./tests/fixtures/seed_grafana.sh

      - name: pytest
        env:
          MCP_BASE_URL: http://localhost:8000
          GRAFANA_URL: http://localhost:3000
        run: |
          export GRAFANA_SERVICE_ACCOUNT_TOKEN=$(grep '^GRAFANA_SERVICE_ACCOUNT_TOKEN=' .env | cut -d= -f2-)
          mkdir -p reports
          PYTHONPATH=. python3 -m pytest tests/ -ra --junitxml=reports/junit.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/

      - name: docker compose down
        if: always()
        run: docker compose --env-file .env -f compose/docker-compose.yml --profile local-grafana down --remove-orphans
