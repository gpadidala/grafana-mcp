# Compose v2 — single source of truth for local stacks.
#
# Profiles:
#   (default)        only the MCP server, expects an external Grafana via .env
#   local-grafana    full LGTM stack: Grafana + Prometheus + Loki + Tempo + Pyroscope
#   inspector        attaches the official MCP Inspector UI
#
# Run:
#   docker compose --env-file .env -f compose/docker-compose.yml up -d
#   docker compose --env-file .env -f compose/docker-compose.yml --profile local-grafana up -d
#   docker compose --env-file .env -f compose/docker-compose.yml --profile inspector up -d
#
# The --env-file is required: Compose otherwise looks for .env next to the
# compose file, not at the repo root.

name: grafana-mcp

services:
  # ─── core ─────────────────────────────────────────────────────────────────
  grafana-mcp:
    image: grafana-mcp:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MCP_GRAFANA_VERSION: "0.12.1"
    container_name: grafana-mcp
    restart: unless-stopped
    env_file: ../.env
    environment:
      GRAFANA_URL: ${GRAFANA_URL:-http://grafana:3000}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_ADDRESS: ${MCP_ADDRESS:-0.0.0.0:8000}
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-info}
      MCP_METRICS: ${MCP_METRICS:-true}
      # Allow the MCP client to scope per-call to a specific Grafana org by
      # passing X-Grafana-Org-Id. Without this allowlist MCP ignores client
      # headers — preventing accidental privilege escalation.
      GRAFANA_FORWARD_HEADERS: ${GRAFANA_FORWARD_HEADERS:-X-Grafana-Org-Id}
      # Default to the full upstream surface so every plugin / datasource
      # type the operator has wired up is reachable. Override via .env if
      # you want to lock down by category.
      MCP_ENABLED_TOOLS: ${MCP_ENABLED_TOOLS:-search,datasource,dashboard,prometheus,loki,alerting,oncall,incidents,sift,navigation,annotations,rendering,pyroscope,asserts,admin,clickhouse,cloudwatch,elasticsearch,examples,graphite,influxdb,runpanelquery,searchlogs}
    ports:
      - "${MCP_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    networks: [mcp]

  # ─── profile: local-grafana — full LGTM ───────────────────────────────────
  grafana:
    profiles: [local-grafana]
    image: grafana/grafana-oss:11.6.4
    container_name: grafana-mcp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards,traceqlEditor,traceqlSearch"
      # Optional plugin install. Empty by default because environments
      # behind a corporate TLS-inspection proxy can't verify
      # https://grafana.com and the container then refuses to start.
      # Override in .env if you want extra datasource types locally:
      #   GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      # Pyroscope and Tempo are core in Grafana 11; no install needed
      # for the four datasources auto-provisioned by this stack.
      GF_INSTALL_PLUGINS: ${GF_INSTALL_PLUGINS:-}
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [mcp]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
      # The provisioning provider in compose/provisioning/dashboards/
      # dashboards.yaml points at /var/lib/grafana/dashboards. Mount the
      # repo's docs/dashboards/ there so the 5 production dashboards are
      # auto-loaded the first time Grafana boots.
      - ../docs/dashboards:/var/lib/grafana/dashboards:ro

  prometheus:
    profiles: [local-grafana]
    image: prom/prometheus:v2.55.1
    container_name: grafana-mcp-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [mcp]

  loki:
    profiles: [local-grafana]
    image: grafana/loki:3.3.2
    container_name: grafana-mcp-loki
    restart: unless-stopped
    # Loki ships running as user 10001:10001; the bind-mounted volume needs
    # to be writable by that uid, so we mount a named volume at /loki and
    # let entrypoint create subdirs.
    user: "10001:10001"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks: [mcp]

  tempo:
    profiles: [local-grafana]
    image: grafana/tempo:2.6.1
    container_name: grafana-mcp-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    ports:
      # OTLP HTTP receiver — exposed so test fixtures can push spans
      # from the host venv without an in-network proxy.
      - "${TEMPO_OTLP_HTTP_HOST_PORT:-4318}:4318"
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    networks: [mcp]

  pyroscope:
    profiles: [local-grafana]
    image: grafana/pyroscope:1.10.0
    container_name: grafana-mcp-pyroscope
    restart: unless-stopped
    # Pyroscope's distroless image runs as the `pyroscope` user; rather
    # than fight named-volume ownership, we use a tmpfs at /data so the
    # image-default user can mkdir freely. State is intentionally
    # ephemeral in the local stack.
    command: ["-config.file=/etc/pyroscope/pyroscope-config.yaml"]
    tmpfs:
      - /data:size=512m,mode=1777
    volumes:
      - ./pyroscope/pyroscope-config.yaml:/etc/pyroscope/pyroscope-config.yaml:ro
    networks: [mcp]

  # ─── profile: inspector ───────────────────────────────────────────────────
  # The MCP Inspector (npm) opens a UI on 6274 and a proxy on 6277. After
  # it boots, open http://localhost:6274 in your browser and enter
  # `http://grafana-mcp:8000/mcp` as the server URL with transport
  # "Streamable HTTP" — the inspector container resolves that via Docker's
  # in-network DNS.
  inspector:
    profiles: [inspector]
    image: node:20-alpine
    container_name: grafana-mcp-inspector
    restart: unless-stopped
    environment:
      # Bind to all interfaces so the host's browser can reach the UI.
      # Default is localhost-inside-container, which is unreachable from
      # outside.
      HOST: "0.0.0.0"
      # Skip the Inspector's auto-launched browser-bound auth token. Safe
      # only on a local dev box — never expose this container publicly.
      DANGEROUSLY_OMIT_AUTH: "true"
      # Optional escape hatch for environments behind a corporate
      # TLS-inspection firewall where npm can't verify the registry's
      # cert chain. Local-dev only — never in production.
      NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"
    command:
      - sh
      - -c
      - npm config set strict-ssl false && npx -y @modelcontextprotocol/inspector@latest
    ports:
      - "${INSPECTOR_HOST_PORT:-6274}:6274"
      - "${INSPECTOR_PROXY_HOST_PORT:-6277}:6277"
    depends_on:
      grafana-mcp:
        condition: service_healthy
    networks: [mcp]

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  tempo-data:

networks:
  mcp:
    driver: bridge
