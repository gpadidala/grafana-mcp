auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# Pattern ingester — required for the patterns endpoint.
pattern_ingester:
  enabled: true

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 168h
  # Required for /loki/api/v1/patterns — the MCP tool query_loki_patterns
  # depends on this endpoint.
  metric_aggregation_enabled: true
  pattern_ingester_tokenizable_json_fields_default: log,message
