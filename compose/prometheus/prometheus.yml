global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: grafana-mcp-local

scrape_configs:
  # Self-scrape so `up` always has at least one series in tests.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The MCP server's own /metrics — gives the self-monitoring dashboard
  # something to render and validates the metrics path end-to-end.
  - job_name: grafana-mcp
    static_configs:
      - targets: ["grafana-mcp:8000"]

  # Grafana's internal metrics — Grafana exposes /metrics on its main port.
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
