global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: grafana-mcp-local

# `namespace` is added as a real series label per-job. In K8s, the
# kubernetes_sd role=pod populates this automatically; the static
# `labels:` below is the local equivalent so the shipped dashboards'
# `namespace` variable resolves out of the box.

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          namespace: grafana-mcp
          pod: prometheus

  - job_name: grafana-mcp
    static_configs:
      - targets: ["grafana-mcp:8000"]
        labels:
          namespace: grafana-mcp
          pod: grafana-mcp
          container: mcp

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          namespace: grafana-mcp
          pod: grafana
