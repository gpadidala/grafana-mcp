stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

# Aggressive flushing so e2e tests can find traces seconds after pushing.
# Production tuning would use the upstream defaults.
ingester:
  flush_check_period: 1s
  trace_idle_period: 5s
  max_block_duration: 30s
  complete_block_timeout: 10s

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
