apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana-mcp

resources:
  - ../../base

# Single replica + writes enabled + debug logging for local AKS dev.
replicas:
  - name: grafana-mcp
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: grafana-mcp-config
    patch: |-
      - op: replace
        path: /data/MCP_LOG_LEVEL
        value: "debug"
      - op: replace
        path: /data/MCP_DISABLE_WRITE
        value: "false"
      - op: add
        path: /data/MCP_DEBUG
        value: "true"
