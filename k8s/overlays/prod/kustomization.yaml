apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana-mcp

resources:
  - ../../base
  - ingress.yaml

# Three replicas across zones; HPA can grow to 10 from base.
replicas:
  - name: grafana-mcp
    count: 3

# Pin by tag (and ideally digest). Replace `digest:` with the sha256 of the
# image you actually rolled out and record it in CHANGELOG.md.
images:
  - name: ghcr.io/gpadidala/grafana-mcp
    newTag: "0.12.1"
    # digest: sha256:REPLACE_WITH_BUILD_DIGEST

patches:
  # 1. Force write-disabled and prod URL.
  - target:
      kind: ConfigMap
      name: grafana-mcp-config
    patch: |-
      - op: replace
        path: /data/GRAFANA_URL
        value: "https://grafana.prod.example.com"
      - op: replace
        path: /data/MCP_DISABLE_WRITE
        value: "true"
      - op: replace
        path: /data/MCP_LOG_LEVEL
        value: "info"

  # 2. Workload Identity annotation on the SA + pod label so the webhook
  #    injects the projected token. Replace the client-id placeholder
  #    before applying.
  - target:
      kind: ServiceAccount
      name: grafana-mcp
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          azure.workload.identity/client-id: "REPLACE_WITH_MANAGED_IDENTITY_CLIENT_ID"

  - target:
      kind: Deployment
      name: grafana-mcp
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/azure.workload.identity~1use
        value: "true"

# Once the SecretProviderClass is provisioned (see base/secret.example.yaml),
# uncomment the strategic-merge patch to switch from a plain Secret to a CSI
# volume sourced from Azure Key Vault.
# patchesStrategicMerge:
#   - replica-patch.yaml
