apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grafana-mcp
  namespace: grafana-mcp
  labels:
    app.kubernetes.io/name: grafana-mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grafana-mcp
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Custom metric example — uncomment when prometheus-adapter is wired.
    # - type: Pods
    #   pods:
    #     metric:
    #       name: mcp_server_operation_duration_seconds_p95
    #     target:
    #       type: AverageValue
    #       averageValue: "1"
  behavior:
    scaleDown:
      # Slow scale-down avoids flapping when AI clients pause.
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
