apiVersion: v1
kind: Service
metadata:
  name: grafana-mcp
  namespace: grafana-mcp
  labels:
    app.kubernetes.io/name: grafana-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
