apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-mcp
  namespace: grafana-mcp
  labels:
    app.kubernetes.io/name: grafana-mcp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Zero-downtime rollouts: surge first, then drain.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-mcp
      annotations:
        # Hint for Prometheus Operator-less environments. The shipped
        # ServiceMonitor is the preferred path.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: grafana-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: grafana-mcp
      containers:
        - name: mcp
          # Our wrapper image — built and pushed by the GitHub Actions
          # workflow on every tag. Overlays pin the version (or digest).
          image: ghcr.io/gpadidala/grafana-mcp:latest
          imagePullPolicy: IfNotPresent
          # The wrapper entrypoint reads env and translates to flags. Args
          # are intentionally minimal so the ConfigMap drives behaviour.
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: grafana-mcp-config
            - secretRef:
                name: grafana-mcp
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            # Writable scratch — required because rootfs is read-only.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
