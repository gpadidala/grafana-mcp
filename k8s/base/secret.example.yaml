# EXAMPLE ONLY — never commit a real token.
#
# Two patterns supported:
#
# (a) Plain Secret — use only in dev. Provide via stdin or a sealed-secret
#     pipeline:
#       kubectl -n grafana-mcp create secret generic grafana-mcp \
#         --from-literal=GRAFANA_SERVICE_ACCOUNT_TOKEN=glsa_...
#
# (b) Recommended for staging/prod — pull from Azure Key Vault via the
#     Secrets Store CSI Driver. The SecretProviderClass below is shipped
#     as part of the prod overlay; the kustomization patches the Deployment
#     to mount it as a volume and references the synced Secret.
#
# Either way, the Deployment expects a Secret named `grafana-mcp` with key
# `GRAFANA_SERVICE_ACCOUNT_TOKEN`.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-mcp
  namespace: grafana-mcp
  labels:
    app.kubernetes.io/name: grafana-mcp
type: Opaque
stringData:
  GRAFANA_SERVICE_ACCOUNT_TOKEN: "REPLACE_ME"
---
