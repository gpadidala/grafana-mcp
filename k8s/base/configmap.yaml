apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-mcp-config
  namespace: grafana-mcp
  labels:
    app.kubernetes.io/name: grafana-mcp
data:
  # Non-secret env. The token lives in the Secret next to this file.
  GRAFANA_URL: "https://grafana.example.com"
  MCP_TRANSPORT: "streamable-http"
  MCP_ADDRESS: "0.0.0.0:8000"
  MCP_LOG_LEVEL: "info"
  MCP_METRICS: "true"
  MCP_METRICS_ADDRESS: "0.0.0.0:9090"
  MCP_SESSION_IDLE_TIMEOUT_MINUTES: "30"
  MCP_MAX_LOKI_LOG_LIMIT: "100"
  # Default to write-disabled at the base; dev/staging overlays flip it back.
  MCP_DISABLE_WRITE: "true"

  # ─── Tool / datasource categories ────────────────────────────────────────
  #
  # Default: full upstream surface. Every datasource type, every plugin
  # category — read-only behaviour is enforced by MCP_DISABLE_WRITE above,
  # not by removing tools from the surface.
  #
  # If you instead want to lock down by category (e.g. drop admin in a
  # developer-facing deployment), uncomment a stricter list and the patch
  # in the relevant overlay will replace this value.
  MCP_ENABLED_TOOLS: "search,datasource,dashboard,prometheus,loki,alerting,oncall,incidents,sift,navigation,annotations,rendering,pyroscope,asserts,admin,clickhouse,cloudwatch,elasticsearch,examples,graphite,influxdb,runpanelquery,searchlogs"
