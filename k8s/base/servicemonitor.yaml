# Requires kube-prometheus-stack / Prometheus Operator. If you don't run
# the operator, drop this manifest and rely on the prometheus.io/scrape
# annotations on the Pod template.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana-mcp
  namespace: grafana-mcp
  labels:
    app.kubernetes.io/name: grafana-mcp
    # The Prometheus Operator's release label varies — set it via overlay.
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-mcp
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      honorLabels: true
