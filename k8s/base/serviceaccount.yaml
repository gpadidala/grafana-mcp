apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-mcp
  namespace: grafana-mcp
  labels:
    app.kubernetes.io/name: grafana-mcp
  # The prod overlay adds the Azure Workload Identity annotation:
  #   azure.workload.identity/client-id: <managed-identity-client-id>
  # Don't add it here — overlay-only so dev/staging keep using the SA token
  # from a plain Secret without identity-broker round trips.
automountServiceAccountToken: false
