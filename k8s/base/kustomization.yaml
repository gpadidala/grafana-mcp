apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana-mcp

labels:
  - pairs:
      app.kubernetes.io/name: grafana-mcp
      app.kubernetes.io/part-of: grafana-mcp
    includeSelectors: false

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.example.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - poddisruptionbudget.yaml
  - hpa.yaml
  - servicemonitor.yaml

images:
  - name: ghcr.io/gpadidala/grafana-mcp
    newTag: dev
